name: Migration Reference Scan

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    reference-scan:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run migration reference scan
              run: bun run migration:reference-scan
